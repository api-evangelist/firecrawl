naftiko: 1.0.0-alpha2
info:
  label: Firecrawl API — Agent
  description: 'Firecrawl API — Agent. 3 operations. Lead operation: Start an agent task for agentic data extraction. Self-contained
    Naftiko capability covering one Firecrawl business surface.'
  tags:
  - Firecrawl
  - Agent
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIRECRAWL_API_KEY: FIRECRAWL_API_KEY
capability:
  consumes:
  - type: http
    namespace: firecrawl-agent
    baseUri: https://api.firecrawl.dev/v2
    description: Firecrawl API — Agent business capability. Self-contained, no shared references.
    resources:
    - name: agent
      path: /agent
      operations:
      - name: startagent
        method: POST
        description: Start an agent task for agentic data extraction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: agent-jobId
      path: /agent/{jobId}
      operations:
      - name: getagentstatus
        method: GET
        description: Get the status of an agent job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: cancelagent
        method: DELETE
        description: Cancel an agent job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FIRECRAWL_API_KEY}}'
  exposes:
  - type: rest
    namespace: firecrawl-agent-rest
    port: 8080
    description: REST adapter for Firecrawl API — Agent. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/agent
      name: agent
      description: REST surface for agent.
      operations:
      - method: POST
        name: startagent
        description: Start an agent task for agentic data extraction
        call: firecrawl-agent.startagent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agent/{jobid}
      name: agent-jobid
      description: REST surface for agent-jobId.
      operations:
      - method: GET
        name: getagentstatus
        description: Get the status of an agent job
        call: firecrawl-agent.getagentstatus
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: cancelagent
        description: Cancel an agent job
        call: firecrawl-agent.cancelagent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: firecrawl-agent-mcp
    port: 9090
    transport: http
    description: MCP adapter for Firecrawl API — Agent. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: start-agent-task-agentic-data
      description: Start an agent task for agentic data extraction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: firecrawl-agent.startagent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-status-agent-job
      description: Get the status of an agent job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: firecrawl-agent.getagentstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-agent-job
      description: Cancel an agent job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: firecrawl-agent.cancelagent
      outputParameters:
      - type: object
        mapping: $.
