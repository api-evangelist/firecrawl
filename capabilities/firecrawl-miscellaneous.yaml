naftiko: 1.0.0-alpha2
info:
  label: Firecrawl API — Miscellaneous
  description: 'Firecrawl API — Miscellaneous. 1 operations. Lead operation: Metrics about your team''s scrape queue. Self-contained
    Naftiko capability covering one Firecrawl business surface.'
  tags:
  - Firecrawl
  - Miscellaneous
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FIRECRAWL_API_KEY: FIRECRAWL_API_KEY
capability:
  consumes:
  - type: http
    namespace: firecrawl-miscellaneous
    baseUri: https://api.firecrawl.dev/v2
    description: Firecrawl API — Miscellaneous business capability. Self-contained, no shared references.
    resources:
    - name: team-queue-status
      path: /team/queue-status
      operations:
      - name: getqueuestatus
        method: GET
        description: Metrics about your team's scrape queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FIRECRAWL_API_KEY}}'
  exposes:
  - type: rest
    namespace: firecrawl-miscellaneous-rest
    port: 8080
    description: REST adapter for Firecrawl API — Miscellaneous. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/team/queue-status
      name: team-queue-status
      description: REST surface for team-queue-status.
      operations:
      - method: GET
        name: getqueuestatus
        description: Metrics about your team's scrape queue
        call: firecrawl-miscellaneous.getqueuestatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: firecrawl-miscellaneous-mcp
    port: 9090
    transport: http
    description: MCP adapter for Firecrawl API — Miscellaneous. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: metrics-about-your-team-s-scrape
      description: Metrics about your team's scrape queue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: firecrawl-miscellaneous.getqueuestatus
      outputParameters:
      - type: object
        mapping: $.
